site_name: Plainsight Playbook
site_url: https://playbook.plainsight.pro
site_description: >-
  Plainsight's open-source company handbook — purpose, values,
  technical guidelines, and operational processes in plain sight.
site_author: Plainsight

theme:
  name: material
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - navigation.footer
    - search.share
  logo: assets/logo.svg
  favicon: images/Plainsight.png
  custom_dir: overrides

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/ask-ai.js

plugins:
  - search


markdown_extensions:
  # Admonitions (converted from Obsidian callouts)
  - admonition
  - pymdownx.details

  # Code blocks
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # Tables
  - tables

  # Footnotes
  - footnotes

  # Highlight ==text== support
  - pymdownx.mark

  # Task lists
  - pymdownx.tasklist:
      custom_checkbox: true

  # Smart symbols & typography
  - pymdownx.smartsymbols

  # Table of contents
  - toc:
      permalink: true

